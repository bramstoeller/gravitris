name: ci

# Deliberately small. docs/build-order.md: "CI beyond a reproducible build" is
# explicitly something this project resists — there is no store pipeline, no
# release automation, and the audience for Stage 0 is the client, not a
# store. What this workflow does is make the two commands every contributor
# already runs locally (`make test`, `make build`) fail loudly in the one
# place a broken `main` would otherwise go unnoticed: a green run here means
# exactly what "the build and tests pass" says.
#
# No emulator, by design — see docs/operations.md "Why there is no emulator
# job" for the full reasoning. Nothing here measures performance; nothing
# here should ever be allowed to.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0 # full history — needed for the secret scan below

      # CHK-7 (docs/security/threat-model.md, chore/threat-model): a
      # keystore or credential must never enter this repo's history. Runs on
      # every push, over the full history, not just the diff.
      - name: Secret scan (CHK-7)
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
          # gitleaks-action@v3 requires a token to enumerate a pull request's
          # commits; without it the step aborts before scanning. The
          # auto-provisioned job token is sufficient — no PAT, no secret added.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # CHK-6 (docs/security/dependency-policy.md R4): a modified wrapper JAR
      # is a well-documented supply-chain attack and is invisible in a normal
      # diff. This checks gradle/wrapper/gradle-wrapper.jar against Gradle's
      # own list of known-good checksums, independent of what this repo
      # claims its own checksum is.
      - name: Validate Gradle wrapper (CHK-6)
        uses: gradle/actions/wrapper-validation@v6.2.0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.6.0
        with:
          distribution: temurin
          java-version: "21"

      # Same script a developer runs via `make setup` — CI and a laptop
      # install the identical, pinned SDK, not two different sets of
      # versions that happen to both work today.
      - name: Install the pinned Android SDK
        run: bash scripts/setup-android-sdk.sh
        env:
          ANDROID_HOME: ${{ runner.temp }}/android-sdk

      - name: Cache Gradle and Android SDK
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ runner.temp }}/android-sdk
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Exactly `make test` — see Makefile. Runs JVM unit tests, the ADR 0008
      # no-Android check, the CHK-1/3/4 merged-manifest checks, and lint,
      # across both the debug and release variants.
      - name: make test
        run: make test
        env:
          ANDROID_HOME: ${{ runner.temp }}/android-sdk

      # Exactly `make build`. Unsigned — no keystore exists in CI, by design
      # (R7, docs/security/dependency-policy.md). Nothing here signs or
      # publishes anything.
      - name: make build
        run: make build
        env:
          ANDROID_HOME: ${{ runner.temp }}/android-sdk

      - name: Upload debug APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gravitris-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
